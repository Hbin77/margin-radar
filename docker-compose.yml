# MR 배포 구성
#  - web      : kis-bot에서 실행 (Cloudflare 터널 → mr.hbinserver.cloud)
#               docker compose up -d web
#  - pipeline : abcd NAS에서 실행 (빅데이터 마운트, data.json 생성)
#               docker compose --profile pipeline run --rm pipeline

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: margin-radar-web
    container_name: mr-web
    restart: unless-stopped
    ports:
      # 로컬에만 노출 — 외부 접근은 Cloudflare 터널 경유
      - "127.0.0.1:8910:80"
    volumes:
      # 라이브 data.json은 git 외부 경로에서 마운트 → 배포 시 git reset이 덮어쓰지 않음.
      # NAS 파이프라인 산출물을 ops/sync_from_nas.sh 가 매일 이 경로로 갱신.
      # (기본값은 kis-bot 경로. 이미지엔 web/data.json 시드가 포함돼 콜드스타트도 안전)
      - ${MR_DATA_FILE:-/home/hbin/mr-shared/data.json}:/usr/share/nginx/html/data.json:ro

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: margin-radar-pipeline
    container_name: mr-pipeline
    profiles: ["pipeline"]
    env_file:
      - .env
    volumes:
      # NAS 프로젝트 홈 전체 마운트(빅데이터 data/ 포함)
      - .:/app
    working_dir: /app/pipeline
    command: python daily_update.py
